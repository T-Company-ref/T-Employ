# 잡코리아 Route Map / Selector Registry
# UI 변경 시 코드가 아닌 이 파일만 수정한다.
# selector 키는 selectors 블록에서 정의하고 routes 에서 참조한다.

platform: jobkorea
version: "2026-07-07"

login:
  url: "https://www.jobkorea.co.kr/Login/"
  # 로그인 성공 판정용 셀렉터 (로그인 후 노출되는 요소)
  success_selector: "success_marker"
  fields:
    username: "login_id"
    password: "login_pw"
  submit: "login_submit"
  # 로그인 페이지로 리다이렉트되면 세션 만료로 판단
  session_expired_selector: "login_id"

routes:
  home:
    url: "https://www.jobkorea.co.kr/"
    ready_selector: "home_nav"

  applicants_list:
    # home 에서의 이동 단계 (지원자 관리 진입)
    path_from_home:
      - action: click
        target: "nav_recruit"
      - action: click
        target: "menu_applicants"
    ready_selector: "applicant_table"
    pagination:
      strategy: "click_next"
      next_selector: "applicant_next_page"

  talent_pool_list:
    # 인재검색 / 포지션 제안 진입
    path_from_home:
      - action: click
        target: "nav_talent"
      - action: click
        target: "menu_talent_search"
    ready_selector: "talent_card"
    pagination:
      strategy: "click_next"
      next_selector: "talent_next_page"

# 실제 셀렉터는 사이트 확인 후 채운다 (Phase 0 dry-run 시 확정).
selectors:
  success_marker: "TODO: 로그인 성공 후 노출 요소"
  login_id: "#M_ID"
  login_pw: "#M_PWD"
  login_submit: "button[type=submit]"
  home_nav: "TODO"
  nav_recruit: "TODO"
  menu_applicants: "TODO"
  applicant_table: "TODO"
  applicant_next_page: "TODO"
  nav_talent: "TODO"
  menu_talent_search: "TODO"
  talent_card: "TODO"
  talent_next_page: "TODO"
