# 사람인 Route Map / Selector Registry
# UI 변경 시 코드가 아닌 이 파일만 수정한다.
#
# 상태: 인증 대기 (2026-07-10)
# - 기업회원 로그인까지 검증 완료
# - 이력서/인재풀 열람 시 2단계 인증(SMS/이메일) 필요 → npm run dev:session -- saramin
# - 인증 완료 전까지 수집·Phase 1 검증은 보류 (잡코리아 우선 진행)

platform: saramin
version: "2026-07-07"

login:
  url: "https://www.saramin.co.kr/zf_user/auth"
  success_selector: "success_marker"
  fields:
    username: "login_id"
    password: "login_pw"
  submit: "login_submit"
  session_expired_selector: "login_id"
  # 기업회원 탭으로 전환 후 로그인 (기본값은 개인회원)
  pre_steps:
    - action: click
      target: "corp_login_tab"
    - action: wait
      value: "600"

routes:
  # 로그인 성공 시 채용센터(hiring.saramin.co.kr)로 이동
  home:
    url: "https://hiring.saramin.co.kr/home"
    ready_selector: "success_marker"

  applicants_list:
    # 채용센터 지원자 관리 (직접 URL 진입)
    url: "https://hiring.saramin.co.kr/applicant-manage"
    ready_selector: "applicant_ready"
    pagination:
      strategy: "click_next"
      next_selector: "applicant_next_page"

  talent_pool_list:
    # 인재풀 검색 (기업 계정, www 도메인 - 세션 공유)
    url: "https://www.saramin.co.kr/zf_user/memcom/talent-pool/main/search"
    ready_selector: "talent_ready"
    pagination:
      strategy: "click_next"
      next_selector: "talent_next_page"

selectors:
  # 기업회원 탭 (통합 로그인 페이지)
  corp_login_tab: ".tab_member_type .btn_tab.t_com"
  # 로그인 성공 판정: 채용센터 지원자관리 내비 링크
  success_marker: "a[href='/applicant-manage']"
  login_id: "#id"
  login_pw: "#password"
  login_submit: "button.btn_login"
  # 아래 목록/페이지네이션 셀렉터는 각 페이지 DOM 확보 후 확정 (임시 body)
  applicant_ready: "body"
  applicant_next_page: "body"
  talent_ready: "body"
  talent_next_page: "body"
