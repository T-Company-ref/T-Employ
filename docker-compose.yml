services:
  db:
    image: postgres:16-alpine
    container_name: t-employ-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: employ
      POSTGRES_PASSWORD: employ
      POSTGRES_DB: t_employ
    ports:
      # 호스트 포트는 POSTGRES_PORT 로 변경 가능 (기본 5432). 로컬에 다른 Postgres 가 있으면 충돌 회피용.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - t_employ_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employ -d t_employ"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  t_employ_pgdata:
