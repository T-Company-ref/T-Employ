name: "Notify workflow result"
description: "워크플로 실행 결과를 운영자(yj.kim@tbell.co.kr)에게 메일로 통지"
inputs:
  conclusion:
    description: "job.status (success, failure, cancelled, etc.)"
    required: true
  extra_message:
    description: "추가 메모 (선택)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Send action result email
      shell: bash
      run: |
        npm run notify:action -- \
          "${{ github.workflow }}" \
          "${{ inputs.conclusion }}" \
          "${{ inputs.extra_message }}"
