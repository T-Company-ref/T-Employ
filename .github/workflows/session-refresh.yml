name: session-refresh

# JobKorea session refresh twice daily (session TTL ~5?6h) + manual.
# KST 07:17 / 13:17 weekdays ? covers poll window 08:17?19:17.
on:
  schedule:
    # 07:17 KST Mon-Fri = 22:17 UTC Sun-Thu
    - cron: "17 22 * * 0-4"
    # 13:17 KST Mon-Fri = 04:17 UTC Mon-Fri
    - cron: "17 4 * * 1-5"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to refresh"
        required: true
        default: "jobkorea"
      notify_ok:
        description: "Email on success (true/false)"
        required: false
        default: "true"

concurrency:
  group: t-employ-db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      JOBKOREA_USERNAME: ${{ secrets.JOBKOREA_USERNAME }}
      JOBKOREA_PASSWORD: ${{ secrets.JOBKOREA_PASSWORD }}
      HEADLESS: "true"
      AUTO_CRAWL_ENABLED: "true"
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
      T_EMPLOY_WORKFLOW: session-refresh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - uses: ./.github/actions/db-load
      - name: Refresh session
        run: |
          EXTRA=""
          if [[ "${{ github.event.inputs.notify_ok || 'true' }}" == "true" ]]; then EXTRA="--notify-ok"; fi
          npm run session:refresh -- "${{ github.event.inputs.platform || 'jobkorea' }}" $EXTRA
      - name: Save sessions
        if: success()
        uses: ./.github/actions/db-save
      - name: Notify result
        if: failure()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
