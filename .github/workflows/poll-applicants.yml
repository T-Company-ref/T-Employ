name: poll-applicants

# Applicant poll — Actions uses Chromium (request HTML often returns 0 applicant rows)
# KST weekdays 08:17~11:17, 13:17~19:17 (skip 12:17)
on:
  schedule:
    # 08:17 KST Mon-Fri = 23:17 UTC Sun-Thu
    - cron: "17 23 * * 0-4"
    # 09:17~11:17 KST = 00:17~02:17 UTC Mon-Fri
    - cron: "17 0-2 * * 1-5"
    # 13:17~19:17 KST = 04:17~10:17 UTC Mon-Fri (skip 12:17 / UTC 03)
    - cron: "17 4-10 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max applicants to fetch"
        required: false
        default: "50"
      dry_run:
        description: "true = no DB write / no mail"
        required: false
        default: "false"

concurrency:
  group: t-employ-db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      JOBKOREA_USERNAME: ${{ secrets.JOBKOREA_USERNAME }}
      JOBKOREA_PASSWORD: ${{ secrets.JOBKOREA_PASSWORD }}
      HEADLESS: "true"
      AUTO_CRAWL_ENABLED: "true"
      CRAWL_MAX_ITEMS: ${{ github.event.inputs.limit || '50' }}
      POLL_USE_BROWSER: "true"
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      T_EMPLOY_WORKFLOW: poll-applicants
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Load sessions (+ DB migrate)
        uses: ./.github/actions/db-load
      - name: Poll applicants (Chromium)
        run: |
          EXTRA=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then EXTRA="--dry-run"; fi
          npm run poll:applicants -- --limit "${CRAWL_MAX_ITEMS}" $EXTRA
      - name: Save sessions
        if: always()
        uses: ./.github/actions/db-save
      - name: Notify result
        if: failure()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
