name: poll-applicants

# кІҪлҹү м§Җ?җмһҗ ?ҙл§Ғ ??Playwright/Chromium ?Өм№ҳ кёҲм?
# KST ?үмқј 08:17~19:17 л§ӨмӢң (UTC cron)
on:
  schedule:
    # 08:17 KST Mon?“Fri = 23:17 UTC Sun?“Thu
    - cron: "17 23 * * 0-4"
    # 09:17??9:17 KST Mon?“Fri = 00:17??0:17 UTC Mon?“Fri
    - cron: "17 0-10 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "мөңл? ?ҳм§‘ кұҙмҲҳ"
        required: false
        default: "50"
      dry_run:
        description: "true л©?DB ?Җ??л©”мқј ?ҶмқҢ"
        required: false
        default: "false"

concurrency:
  group: t-employ-db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      JOBKOREA_USERNAME: ${{ secrets.JOBKOREA_USERNAME }}
      JOBKOREA_PASSWORD: ${{ secrets.JOBKOREA_PASSWORD }}
      HEADLESS: "true"
      AUTO_CRAWL_ENABLED: "true"
      CRAWL_MAX_ITEMS: ${{ github.event.inputs.limit || '50' }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      T_EMPLOY_WORKFLOW: poll-applicants
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Load sessions (+ DB migrate)
        uses: ./.github/actions/db-load
      - name: Poll applicants (no Playwright)
        run: |
          EXTRA=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then EXTRA="--dry-run"; fi
          npm run poll:applicants -- --limit "${CRAWL_MAX_ITEMS}" $EXTRA
      - name: Save sessions
        if: always()
        uses: ./.github/actions/db-save
      - name: Notify result
        if: failure()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
