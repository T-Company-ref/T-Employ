name: compose-daily-report

# 매일 07:50 KST (전일 22:50 UTC) 전일 데이터 집계 및 요약 메일 큐 등록
on:
  schedule:
    - cron: "50 22 * * *"
  workflow_dispatch:

concurrency:
  group: db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      DAILY_REPORT_RECIPIENTS: ${{ secrets.DAILY_REPORT_RECIPIENTS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Load DB (restore + migrate)
        uses: ./.github/actions/db-load
      - name: Compose daily report
        run: npm run report:compose
      - name: Save DB snapshot
        uses: ./.github/actions/db-save
