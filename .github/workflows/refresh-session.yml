name: refresh-session

# Legacy manual-only alias. Scheduled refresh uses session-refresh.yml.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to refresh"
        required: true
        default: "jobkorea"

concurrency:
  group: t-employ-db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      SESSION_ENC_KEY: ${{ secrets.SESSION_ENC_KEY }}
      JOBKOREA_USERNAME: ${{ secrets.JOBKOREA_USERNAME }}
      JOBKOREA_PASSWORD: ${{ secrets.JOBKOREA_PASSWORD }}
      SARAMIN_USERNAME: ${{ secrets.SARAMIN_USERNAME }}
      SARAMIN_PASSWORD: ${{ secrets.SARAMIN_PASSWORD }}
      HEADLESS: "true"
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Load DB (restore + migrate)
        uses: ./.github/actions/db-load
      - name: Refresh session
        run: npm run session:refresh -- "${{ github.event.inputs.platform }}"
      - name: Save DB snapshot
        if: success()
        uses: ./.github/actions/db-save
      - name: Notify result
        if: always()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
