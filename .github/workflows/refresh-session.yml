name: refresh-session

# 세션 재발급 전용 (수동 실행 / 로그인 실패 시 복구)
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "세션 재발급 대상 플랫폼"
        required: true
        default: "jobkorea"

concurrency:
  group: db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      SESSION_ENC_KEY: ${{ secrets.SESSION_ENC_KEY }}
      JOBKOREA_USERNAME: ${{ secrets.JOBKOREA_USERNAME }}
      JOBKOREA_PASSWORD: ${{ secrets.JOBKOREA_PASSWORD }}
      SARAMIN_USERNAME: ${{ secrets.SARAMIN_USERNAME }}
      SARAMIN_PASSWORD: ${{ secrets.SARAMIN_PASSWORD }}
      HEADLESS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Load DB (restore + migrate)
        uses: ./.github/actions/db-load
      - name: Route check (dry-run)
        run: npm run dev:check
      - name: Save DB snapshot
        uses: ./.github/actions/db-save
