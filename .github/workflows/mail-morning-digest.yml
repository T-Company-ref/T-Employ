name: mail-morning-digest

# Morning digest from DB ? no Playwright. 07:37 KST weekdays
on:
  schedule:
    # 07:37 KST Mon-Fri = 22:37 UTC Sun-Thu
    - cron: "37 22 * * 0-4"
  workflow_dispatch:
    inputs:
      force:
        description: "true = force weekday/window"
        required: false
        default: "false"
      talents_only:
        description: "true = talents only"
        required: false
        default: "false"

concurrency:
  group: t-employ-db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      HEADLESS: "true"
      AUTO_CRAWL_ENABLED: "true"
      DIGEST_SKIP_BROWSER: "true"
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
      T_EMPLOY_WORKFLOW: mail-morning-digest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: ./.github/actions/db-load
      - name: Send morning digest
        run: |
          ARGS="--no-browser"
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then ARGS="$ARGS --force"; fi
          if [[ "${{ github.event.inputs.talents_only }}" == "true" ]]; then ARGS="$ARGS --talents-only"; fi
          npm run mail:morning-digest -- $ARGS
      - name: Notify result
        if: failure()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
