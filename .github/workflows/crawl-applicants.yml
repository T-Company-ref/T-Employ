name: crawl-applicants

# 매일 18:00 KST (09:00 UTC) 공고 지원자 수집
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "특정 플랫폼만 실행 (비우면 전체)"
        required: false
        default: ""

concurrency:
  group: db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # DATABASE_URL 미설정 시 임베디드 PGlite(스냅샷 지속) 사용
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      SESSION_ENC_KEY: ${{ secrets.SESSION_ENC_KEY }}
      JOBKOREA_USERNAME: ${{ secrets.JOBKOREA_USERNAME }}
      JOBKOREA_PASSWORD: ${{ secrets.JOBKOREA_PASSWORD }}
      JOBKOREA_TOTP_SECRET: ${{ secrets.JOBKOREA_TOTP_SECRET }}
      SARAMIN_USERNAME: ${{ secrets.SARAMIN_USERNAME }}
      SARAMIN_PASSWORD: ${{ secrets.SARAMIN_PASSWORD }}
      SARAMIN_TOTP_SECRET: ${{ secrets.SARAMIN_TOTP_SECRET }}
      HEADLESS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Load DB (restore + migrate)
        uses: ./.github/actions/db-load
      - name: Crawl applicants
        run: npm run crawl:applicants -- "${{ github.event.inputs.platform }}"
      - name: Save DB snapshot
        uses: ./.github/actions/db-save
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applicants-artifacts
          path: |
            screenshots/
          if-no-files-found: ignore
          retention-days: 14
