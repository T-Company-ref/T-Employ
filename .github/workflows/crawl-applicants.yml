name: crawl-applicants

# 공고 지원자 수집 — 수동 실행 (cron 비활성, 결과 메일 항시 발송)
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "특정 플랫폼만 실행 (비우면 전체)"
        required: false
        default: ""

concurrency:
  group: db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      SESSION_ENC_KEY: ${{ secrets.SESSION_ENC_KEY }}
      JOBKOREA_USERNAME: ${{ secrets.JOBKOREA_USERNAME }}
      JOBKOREA_PASSWORD: ${{ secrets.JOBKOREA_PASSWORD }}
      JOBKOREA_TOTP_SECRET: ${{ secrets.JOBKOREA_TOTP_SECRET }}
      SARAMIN_USERNAME: ${{ secrets.SARAMIN_USERNAME }}
      SARAMIN_PASSWORD: ${{ secrets.SARAMIN_PASSWORD }}
      SARAMIN_TOTP_SECRET: ${{ secrets.SARAMIN_TOTP_SECRET }}
      HEADLESS: "true"
      AUTO_CRAWL_ENABLED: "false"
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: yj.kim@tbell.co.kr
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Load DB (restore + migrate)
        uses: ./.github/actions/db-load
      - name: Crawl applicants
        run: npm run crawl:applicants -- "${{ github.event.inputs.platform }}"
      - name: Save DB snapshot
        if: success()
        uses: ./.github/actions/db-save
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applicants-artifacts
          path: |
            screenshots/
          if-no-files-found: ignore
          retention-days: 14
      - name: Notify result
        if: always()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
