name: send-daily-mail

# ?붿빟 硫붿씪 諛쒖넚 ???섎룞 ?ㅽ뻾 (cron 鍮꾪솢?? 寃곌낵 硫붿씪 ??떆 諛쒖넚)
on:
  workflow_dispatch:

concurrency:
  group: db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      DAILY_REPORT_RECIPIENTS: yj.kim@tbell.co.kr
      AUTO_CRAWL_ENABLED: "false"
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Load DB (restore + migrate)
        uses: ./.github/actions/db-load
      - name: Send daily mail
        run: npm run mail:send
      - name: Save DB snapshot
        if: success()
        uses: ./.github/actions/db-save
      - name: Notify result
        if: always()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
