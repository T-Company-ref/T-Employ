name: deploy-web

# Phase 3.5 — GitHub Pages 정적 웹 UI 배포
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard - Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_ANON_KEY}" ]]; then
            echo "::error::GitHub Secrets 에 SUPABASE_URL, SUPABASE_ANON_KEY 를 등록하세요."
            exit 1
          fi

      - name: Write config.js from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const url = process.env.SUPABASE_URL || '';
          const key = process.env.SUPABASE_ANON_KEY || '';
          const body = `window.__TBELL_EMPLOY_CONFIG__ = {\n` +
            `  supabaseUrl: ${JSON.stringify(url)},\n` +
            `  supabaseAnonKey: ${JSON.stringify(key)},\n` +
            `};\n`;
          fs.writeFileSync('web/config.js', body, 'utf8');
          console.log('[deploy-web] config.js written');
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
