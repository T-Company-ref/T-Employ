name: db-setup-supabase

# Apply shared schema + Supabase RLS/auth (manual only).
on:
  workflow_dispatch:
    inputs:
      seed:
        description: "Run seed (platform_configs / staff_profiles)"
        type: boolean
        required: false
        default: true

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: "true"
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Guard - DATABASE_URL required
        run: |
          if [[ "${DATABASE_URL:-}" != postgres* ]]; then
            echo "::error::DATABASE_URL must be a postgres:// connection string (Supabase Session pooler URL)."
            exit 1
          fi
      - name: Migrate (shared schema)
        run: npm run db:migrate
      - name: Seed (optional)
        if: ${{ inputs.seed }}
        run: npm run db:seed
      - name: Apply Supabase RLS/auth
        run: npm run db:supabase
      - name: Status
        run: npm run db:status
      - name: Notify result
        if: always()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
