name: db-setup-supabase

# Supabase ?ㅽ궎留?+ RLS/auth ?뺤콉 ?곸슜 (?섎룞 ?ㅽ뻾, 寃곌낵 硫붿씪 ??떆 諛쒖넚)
on:
  workflow_dispatch:
    inputs:
      seed:
        description: "珥덇린 ?쒕뱶(platform_configs/staff_profiles ?? ?곸슜 ?щ?"
        type: boolean
        required: false
        default: true

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: "true"
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Guard - DATABASE_URL ?꾩닔
        run: |
          if [[ "${DATABASE_URL:-}" != postgres* ]]; then
            echo "::error::DATABASE_URL ??postgres:// ?묒냽 臾몄옄?댁씠 ?꾨떃?덈떎. Supabase Session pooler URL ???깅줉?섏꽭??"
            exit 1
          fi
      - name: Migrate (怨듯넻 ?ㅽ궎留?
        run: npm run db:migrate
      - name: Seed (?좏깮)
        if: ${{ inputs.seed }}
        run: npm run db:seed
      - name: Apply Supabase RLS/auth
        run: npm run db:supabase
      - name: Status
        run: npm run db:status
      - name: Notify result
        if: always()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
