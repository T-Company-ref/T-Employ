name: pdf-applicants

# Missing applicant PDFs only ? Playwright. Weekday 07:27 KST + manual
on:
  schedule:
    # 07:27 KST Mon-Fri = 22:27 UTC Sun-Thu
    - cron: "27 22 * * 0-4"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max PDFs"
        required: false
        default: "10"
      ref:
        description: "Specific external_ref (optional)"
        required: false
        default: ""
      repair:
        description: "Re-fetch broken PDFs (true/false)"
        required: false
        default: "false"

concurrency:
  group: t-employ-db-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PGSSL: ${{ secrets.DATABASE_URL != '' && 'true' || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      JOBKOREA_USERNAME: ${{ secrets.JOBKOREA_USERNAME }}
      JOBKOREA_PASSWORD: ${{ secrets.JOBKOREA_PASSWORD }}
      HEADLESS: "true"
      AUTO_CRAWL_ENABLED: "true"
      CRAWL_FETCH_RESUMES: "true"
      PDF_MAX_ITEMS: ${{ github.event.inputs.limit || '10' }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      ACTION_NOTIFY_EMAIL: ${{ vars.ACTION_NOTIFY_EMAIL || 'yj.kim@tbell.co.kr' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      T_EMPLOY_WORKFLOW: pdf-applicants
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - uses: ./.github/actions/db-load
      - name: Fetch missing PDFs
        run: |
          ARGS="--limit ${PDF_MAX_ITEMS}"
          if [[ -n "${{ github.event.inputs.ref }}" ]]; then
            ARGS="$ARGS --ref=${{ github.event.inputs.ref }}"
          fi
          if [[ "${{ github.event.inputs.repair }}" == "true" ]]; then
            ARGS="$ARGS --repair"
          fi
          npm run pdf:applicants -- $ARGS
      - name: Save sessions
        if: always()
        uses: ./.github/actions/db-save
      - name: Notify result
        if: failure()
        uses: ./.github/actions/notify-result
        with:
          conclusion: ${{ job.status }}
